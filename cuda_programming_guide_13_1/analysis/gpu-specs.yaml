  H100:
    name: NVIDIA H100 Tensor Core GPU
    references:
      - name: NVIDIA H100 GPU Whitepaper
        url: https://resources.nvidia.com/en-us-hopper-architecture/nvidia-h100-tensor-c?ncid=no-ncid
      - name: NVIDIA H100 GPU Datasheet
        url: https://resources.nvidia.com/en-us-hopper-architecture/nvidia-tensor-core-gpu-datasheet?ncid=no-ncid
      - name: NVIDIA H100 Product Page
        url: https://www.nvidia.com/en-us/data-center/h100/

    # Two variants ship: SXM5 (high-density 8-GPU server boards) and PCIe (NVL dual-slot card).
    # Specs below note variant differences where they exist; SXM5 is the primary datacenter form factor.

    core_specifications:
      release_date: March 2023
      architecture: Hopper (GH100)
      compute_capability: 9.0
      gpu_count: 1
      cpu: "Host CPU (user-supplied)"
      streaming_multiprocessors: "132 (SXM5) / 114 (PCIe)"
      cuda_cores: "16896 (SXM5, 128 per SM × 132) / 14592 (PCIe)"
      max_clock_speed: "~1830 MHz boost (SXM5)"
      form_factor: "SXM5 board (server) / PCIe dual-slot air-cooled card"

    sm_execution_model:
      shared_memory_per_sm: 228 KB
      shared_memory_per_block: 227 KB
      max_resident_threads_per_sm: 2048
      max_resident_blocks_per_sm: 32

    memory_specifications:
      # SXM5 uses HBM3; PCIe / NVL uses HBM2e
      total_memory: "80 GB HBM3 (SXM5) / 94 GB HBM2e per card (NVL PCIe)"
      memory_type: "HBM3 (SXM5) / HBM2e (PCIe/NVL)"
      l2_cache: 50 MB
      memory_bandwidth_gpu: "3.35 TB/s (SXM5) / 3.9 TB/s (NVL PCIe)"
      memory_bandwidth_cpu: "Host-dependent (PCIe Gen 5 ~128 GB/s bi-directional CPU↔GPU transfer)"
      memory_bus_width: "5120-bit (SXM5) / 5120-bit (PCIe)"
      ecc_support: true
      memory_architecture: Discrete HBM GPU memory
      addressing_mode: Standard (PCIe) / NVLink fabric (SXM5 in HGX/DGX)
      pageable_memory_access_via_host_page_tables: false
      concurrent_managed_access: true
      pcie_generation: Gen 5 (128 GB/s bi-directional)

    compute_performance:
      # * = with sparsity
      fp64: "34 TFLOPS (SXM5) / 30 TFLOPS (PCIe)"
      fp64_tensor_core: "67 TFLOPS (SXM5) / 60 TFLOPS (PCIe)"
      fp32: "67 TFLOPS (SXM5) / 60 TFLOPS (PCIe)"
      tf32_tensor_core: "989 TFLOPS* (SXM5) / 835 TFLOPS* (PCIe)"
      fp16_bf16_tensor_core: "1979 TFLOPS* (SXM5) / 1671 TFLOPS* (PCIe)"
      fp8_tensor_core: "3958 TFLOPS* (SXM5) / 3341 TFLOPS* (PCIe)"
      int8_tensor_core: "3958 TOPS* (SXM5) / 3341 TOPS* (PCIe)"
      fp4: Not supported
      fp6: Not supported
      tensor_core_generation: "4th Gen (Hopper)"
      fp8_support: true
      fp4_fp6_tensor_core_support: false

    power_and_thermal:
      tdp: "Up to 700 W configurable (SXM5) / 350–400 W configurable (PCIe/NVL)"
      form_factor: "SXM5 server board / PCIe dual-slot air-cooled"
      cooling: "Liquid-cooled (SXM5 in HGX/DGX) / Air-cooled (PCIe)"
      power_efficiency_fp16: "~141 GFLOPS/W (SXM5, 989 TFLOPS TF32 / 700 W)"

    advanced_features:
      mig: "Yes (up to 7 instances — 10 GB each on SXM5 / 12 GB each on PCIe NVL)"
      mig_instances_per_gpu: 7
      nvlink: "4th Gen NVLink — 900 GB/s (SXM5) / 600 GB/s (PCIe)"
      nvswitch: "Via HGX/DGX board (NVSwitch 3.0) — not on standalone PCIe card"
      nvdec_per_gpu: 7
      nvjpeg_per_gpu: 7
      dynamic_programming: Full support
      thread_block_clusters: true
      tensor_memory_accelerator: true
      hardware_coherency: false
      transformer_engine: "Yes (FP8 optimized — first generation)"
      distributed_shared_memory: true
      confidential_computing: "Full support with TEE (first GPU with hardware TEE)"
      dpx_instructions: "Yes (7× faster dynamic programming vs A100)"
      atomic_caps_outbound: Standard

    networking_and_connectivity:
      pcie_interface: PCIe Gen 5 x16 (128 GB/s bi-directional)
      high_speed_interconnect: "NDR InfiniBand (400 Gb/s) / Ethernet (400 Gb/s) via external NIC"
      nvlink_fabric: "900 GB/s per GPU via NVSwitch 3.0 in HGX H100 8-GPU server"
      multi_node_clustering: "Native support via InfiniBand / Ethernet"
      rdma: "Yes (GPUDirect RDMA)"
      gpu_to_gpu_direct: "Yes (GPUDirect RDMA + NVLink within node)"
      sharp: true

    software_and_ecosystem:
      cuda_toolkit: "11.8+"
      minimum_driver: "520.61.05+"
      cublas: "cuBLAS 11.x+ with FP8"
      cudnn: "8.6+ (FP8 support)"
