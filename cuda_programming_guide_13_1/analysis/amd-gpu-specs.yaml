# AMD Instinct GPU Specifications
# Terminology is native AMD/ROCm throughout.
# See amd-nvidia-terminology.md for a concept-level mapping to NVIDIA terms.

common_references:
  - name: ROCm Documentation
    url: https://rocm.docs.amd.com/en/latest/
  - name: AMD Instinct Accelerator Tech Docs (ISA, Whitepapers)
    url: https://www.amd.com/en/products/accelerators/instinct.html#documentation
  - name: HIP Programming Guide
    url: https://rocm.docs.amd.com/projects/HIP/en/latest/user_guide/hip_programming_guide.html
  - name: AMD CDNA 3 Architecture
    url: https://www.amd.com/content/dam/amd/en/documents/instinct-tech-docs/white-papers/amd-cdna-3-white-paper.pdf
  - name: AMD CDNA 4 Architecture
    url: https://www.amd.com/content/dam/amd/en/documents/instinct-tech-docs/white-papers/amd-cdna-4-architecture-whitepaper.pdf

gpus:

  MI355X_8NODE_RACK:
    name: AMD Instinct MI355X 8-Node Rack Platform
    references:
      - name: AMD Instinct MI355X Product Page
        url: https://www.amd.com/en/products/accelerators/instinct/mi350/mi355x.html
      - name: MI355X GPU Brochure
        url: https://www.amd.com/content/dam/amd/en/documents/instinct-tech-docs/product-briefs/amd-instinct-mi355x-gpu-brochure.pdf
      - name: MI355X GPU Platform (8 GPUs) Brochure
        url: https://www.amd.com/content/dam/amd/en/documents/instinct-tech-docs/product-briefs/amd-instinct-miI355x-platform-brochure.pdf

    # The MI355X is the top-bin variant of the MI350 series (CDNA 4 architecture).
    # An 8-node MI355X rack consists of 8 compute nodes, each with:
    #   - 1× AMD Universal Base Board (UBB)
    #   - 8× MI355X OAM accelerators
    #   - 2× AMD EPYC Turin CPUs
    # Total: 64 MI355X GPUs per rack.
    # Within each node, all 8 GPUs are fully interconnected via XGMI/Infinity Fabric.
    # Cross-node communication uses InfiniBand or Ethernet (scale-out network).

    core_specifications:
      configuration: "8 compute nodes × 8 MI355X OAM GPUs = 64 GPUs per rack"
      release_date: "H2 2025"
      architecture: "CDNA 4 (per GPU)"
      gpus_per_node: 8
      gpus_per_rack: 64
      host_cpu_per_node: "2× AMD EPYC Turin (~128–192 cores per dual-socket node)"
      form_factor: "Rack-mount nodes (1–2U per node; full rack ~42U)"
      intra_node_topology: "Full all-to-all XGMI mesh (8 GPUs per node)"
      cross_node_topology: "InfiniBand NDR or 800GbE (scale-out fat-tree)"

    cu_execution_model:
      # Per-GPU figures (MI355X = top-bin CDNA 4)
      compute_units_per_gpu: "~320 CUs (top-bin MI355X, estimated)"
      wavefront_size: 64
      max_workitems_per_cu: 2048
      stream_processors_per_cu: 64
      vgpr_per_cu: "256 KB VGPR"

    memory_specifications:
      architecture: "Dedicated HBM3E per GPU; flat coherent address space intra-node via XGMI; cross-node via RDMA"
      ecc_support: true

      per_gpu_memory:
        capacity: "288 GB HBM3E"
        memory_type: HBM3E
        bandwidth: "~8.0 TB/s"
        bus_width: "8192-bit"

      per_node_memory:
        total_capacity: "2.3 TB HBM3E (288 GB × 8 GPUs)"
        aggregate_bandwidth: "~64 TB/s (8.0 TB/s × 8)"
        xgmi_intra_node_bandwidth: "~896 GB/s all-to-all (CDNA 4 XGMI estimated)"

      per_rack_memory:
        total_capacity: "~18.4 TB HBM3E (288 GB × 64 GPUs)"
        aggregate_bandwidth: "~512 TB/s (8.0 TB/s × 64 GPUs)"
        notes: "Cross-node access via InfiniBand (400–800 Gb/s per link) — far lower bandwidth than intra-node XGMI"

      memory_hierarchy:
        # Per-GPU metrics; aggregated up to node and rack where relevant

        vgpr_registers:
          capacity_per_cu: "256 KB VGPR"
          total_per_gpu: "~80 MB (estimated)"
          total_per_node: "~640 MB (8 GPUs)"
          total_per_rack: "~5.1 GB (64 GPUs)"

        lds_local_data_share:
          capacity_per_cu: "64 KB LDS"
          total_per_gpu: "~20 MB"
          total_per_node: "~160 MB"
          total_per_rack: "~1.3 GB"

        infinity_cache:
          capacity_per_gpu: "~256–512 MB (estimated)"
          total_per_node: "~2–4 GB (8 GPUs)"
          total_per_rack: "~16–32 GB (64 GPUs)"

        hbm_global_memory:
          capacity_per_gpu: "288 GB HBM3E"
          capacity_per_node: "2.3 TB HBM3E"
          capacity_per_rack: "~18.4 TB HBM3E"
          bandwidth_per_gpu: "~8.0 TB/s"
          bandwidth_per_node: "~64 TB/s"
          bandwidth_per_rack: "~512 TB/s"

    compute_performance:
      # Per-GPU (MI355X top-bin CDNA 4, estimated)
      fp16_bf16_mfma_per_gpu: "~2600+ TFLOPS dense"
      fp8_mfma_per_gpu: "~5200+ TFLOPS dense"
      fp4_mfma_per_gpu: "~10400+ TFLOPS dense"
      fp64_mfma_per_gpu: "~320 TFLOPS"

      # Per-node (8 GPUs)
      fp16_bf16_mfma_per_node: "~20.8+ PFLOPS dense"
      fp8_mfma_per_node: "~41.6+ PFLOPS dense"
      fp4_mfma_per_node: "~83.2+ PFLOPS dense"
      fp64_mfma_per_node: "~2.56 PFLOPS"

      # Per-rack (64 GPUs)
      fp16_bf16_mfma_per_rack: "~166+ PFLOPS dense"
      fp8_mfma_per_rack: "~333+ PFLOPS dense"
      fp4_mfma_per_rack: "~666+ PFLOPS dense"
      fp64_mfma_per_rack: "~20.5 PFLOPS"

      fp4_support: true
      fp6_support: true
      fp8_support: true
      matrix_core_generation: "4th Gen CDNA Matrix Cores (MFMA)"
      notes: "Figures estimated from CDNA 4 architecture targets; official MI355X datasheet pending as of Q1 2026"

    power_and_thermal:
      tdp_per_gpu: "~1000 W (OAM socket limit, estimated)"
      tdp_per_node: "~10 kW (8 GPUs + 2 CPUs + interconnects)"
      tdp_per_rack: "~80–100 kW (64 GPUs + CPUs + networking, estimated)"
      cooling: "Direct liquid cooling mandatory for all compute nodes"
      power_distribution: "Three-phase datacenter power (240V AC or 48V DC OCP rack standard)"

    advanced_features:
      fp4_native: true
      fp6_native: true
      fp8_native: true
      compute_partitioning: "Yes (per GPU — Accelerator Partitioning Mode, CDNA 4)"
      intra_node_topology: "Full all-to-all GPU XGMI mesh (8 GPUs per node)"
      cross_node_topology: "Fat-tree InfiniBand or Ethernet scale-out"
      unified_memory_intra_node: "Yes — flat coherent HBM3E address space across 8 GPUs via XGMI"
      unified_memory_cross_node: "No — explicit MPI/RCCL collective operations required across nodes"

    networking_and_connectivity:
      intra_node_gpu_interconnect: "XGMI / Infinity Fabric — ~896 GB/s all-to-all per node (CDNA 4 estimated)"
      cross_node_interconnect: "NDR InfiniBand (400 Gb/s per port) or 800GbE — 2–4 NICs per node typical"
      rdma: "ROCEv2 or InfiniBand RDMA; HIPDirect RDMA for GPU HBM3E ↔ NIC zero-copy"
      cpu_gpu_coherency: "Coherent within node via Infinity Fabric with AMD EPYC Turin"
      pcie_per_node: "PCIe 5.0 x16 per GPU (host control path)"

    software_and_ecosystem:
      rocm_version: "ROCm 6.x+"
      programming_model: "HIP C++ (compiled with hipcc)"
      collective_comms: "RCCL (topology-aware for Infinity Fabric multi-GPU and multi-node)"
      mpi: "OpenMPI / Cray MPICH with ROCm-aware MPI"
      math_libraries: "rocBLAS, rocFFT, rocSPARSE"
      dnn_library: "MIOpen"
      inference_runtime: "MIGraphX"
      pytorch: "PyTorch 2.x+ (ROCm backend)"
      tensorflow: "TensorFlow 2.x+ (ROCm backend)"
      jax: "JAX with ROCm backend"
      llm_serving: "vLLM (ROCm support for MI300X / MI350 series)"
      training_frameworks: "Megatron-LM, DeepSpeed (ROCm-compatible)"
      profiler: "ROCProfiler, Omniperf (roofline analysis)"
  
  MI350X:
    name: AMD Instinct MI350X
    references:
      - name: AMD Instinct MI350 Product Family
        url: https://www.amd.com/en/products/accelerators/instinct/mi350.html
 
    # MI350X is AMD's top-bin CDNA 4 accelerator, announced October 2024.
    # CDNA 4 introduces native FP4 and FP6 MFMA matrix instructions, significantly
    # higher matrix throughput, and HBM3E for greater capacity and bandwidth.
    # OAM form factor — drop-in upgrade to Universal Base Boards designed for MI300X.

    core_specifications:
      release_date: "H2 2025"
      architecture: "CDNA 4"
      target_id: "gfx950 (estimated)"
      gpu_count: 1
      host_cpu: "User-supplied (AMD EPYC Turin recommended)"
      process_node: "TSMC N3E (3nm class, estimated)"
      compute_units: "~320 CUs (estimated)"
      stream_processors_per_cu: 64
      stream_processors_per_gpu: "~20480 (estimated; 64 × ~320 CUs)"
      wavefront_size: 64
      max_clock_speed: "~2300 MHz (estimated)"
      form_factor: "OAM (OCP Accelerator Module)"

    cu_execution_model:
      lds_per_cu: "64 KB LDS"
      max_wavefronts_per_cu: 32
      max_workitems_per_cu: 2048
      simd_units_per_cu: 4
      vgpr_per_cu: "256 KB VGPR"

      # CDNA 4 doubles or quadruples MFMA throughput for FP8/FP4/FP6 vs. CDNA 3
      per_cycle_throughput_per_cu:
        fp64_vector_per_cycle: "64 FP64 ops/cycle"
        fp32_vector_per_cycle: "64 FP32 ops/cycle"
        fp64_matrix_mfma_per_cycle: "512 FLOP/cycle (estimated)"
        fp16_bf16_matrix_mfma_per_cycle: "~2048 FLOP/cycle (estimated; ~2× CDNA 3)"
        fp8_matrix_mfma_per_cycle: "~4096 FLOP/cycle (estimated)"
        fp6_matrix_mfma_per_cycle: "~4096 FLOP/cycle (FP6 new in CDNA 4)"
        fp4_matrix_mfma_per_cycle: "~8192 FLOP/cycle (FP4 new in CDNA 4)"
      notes: "CDNA 4 adds v_mfma_f6 and v_mfma_f4 instructions; ~35× claimed AI inference gain vs CDNA 3 at system level"

    memory_specifications:
      architecture: "Dedicated HBM3E; coherent with AMD EPYC Turin via Infinity Fabric"
      total_capacity: "288 GB HBM3E"
      memory_type: HBM3E
      ecc_support: true
      addressing_mode: "Flat/Coherent via Infinity Fabric with EPYC; PCIe otherwise"
      pageable_memory_access: true
      concurrent_managed_access: true

      gpu_memory:
        capacity: "288 GB HBM3E"
        memory_type: HBM3E
        infinity_cache: "~256–512 MB (estimated; CDNA 4 expected to increase Infinity Cache)"
        bandwidth: "~8.0 TB/s"
        bus_width: "8192-bit (8 HBM3E stacks × 1024-bit)"

      memory_hierarchy:
        vgpr_registers:
          capacity_per_cu: "256 KB VGPR"
          total_per_gpu: "~80 MB (estimated)"
          latency: "~1 cycle"

        lds_local_data_share:
          capacity_per_cu: "64 KB LDS"
          total_per_gpu: "~20 MB (estimated)"
          latency: "~30–40 cycles"

        l1_cache:
          capacity_per_cu: "32 KB L1 (expected; same as CDNA 3)"
          latency: "~20–30 cycles"

        infinity_cache:
          capacity: "~256–512 MB (estimated)"
          throughput: "~30+ TB/s (estimated)"
          latency: "~200–250 cycles"

        hbm_global_memory:
          capacity: "288 GB HBM3E"
          memory_type: HBM3E
          throughput: "~8.0 TB/s"
          latency: "~400–500 cycles"
          bus_width: "8192-bit"

    compute_performance:
      fp64_mfma_matrix: "~320 TFLOPS (estimated; ~2× MI300X)"
      fp32_mfma_matrix: "~320 TFLOPS (estimated)"
      fp16_bf16_mfma_dense: "~2600+ TFLOPS (estimated)"
      fp8_mfma_dense: "~5200+ TFLOPS (estimated)"
      fp6_mfma_dense: "~5200+ TFLOPS (estimated; new in CDNA 4)"
      fp4_mfma_dense: "~10400+ TFLOPS (estimated; new in CDNA 4)"
      int8_mfma_dense: "~5200+ TOPS (estimated)"
      fp4_support: true
      fp6_support: true
      fp8_support: true
      matrix_core_generation: "4th Gen CDNA Matrix Cores (MFMA)"
      notes: "AMD claims ~35× AI inference improvement for LLM serving workloads vs. CDNA 3 generation"

    power_and_thermal:
      socket_tdp: "~1000 W (OAM socket limit, estimated)"
      form_factor: OAM
      cooling: "Direct liquid cooling required"
      compute_efficiency_fp16: "~2600+ GFLOPS/W (estimated)"

    advanced_features:
      compute_partitioning: "Yes — enhanced Accelerator Partitioning (CDNA 4)"
      xgmi_infinity_fabric: "5th Gen XGMI / Infinity Fabric (estimated; higher bandwidth vs CDNA 3)"
      fp4_native: true
      fp6_native: true
      fp8_native: true
      unified_virtual_address_space: true
      peer_memory_access: "Direct XGMI peer access within OAM node"

    networking_and_connectivity:
      pcie_interface: PCIe 5.0 x16
      intra_node_interconnect: "5th Gen XGMI / Infinity Fabric (within OAM node, up to 8 GPUs)"
      rdma: "ROCEv2 via external NIC"
      gpu_memory_rdma: "HIPDirect RDMA"

    software_and_ecosystem:
      rocm_version: "ROCm 6.x+"
      programming_model: "HIP C++"
      math_libraries: "rocBLAS, rocFFT, rocSPARSE"
      dnn_library: "MIOpen"
      inference_runtime: "MIGraphX"
      collective_comms: "RCCL"
      pytorch: "PyTorch 2.x+ (ROCm backend)"
      tensorflow: "TensorFlow 2.x+ (ROCm backend)"
      jax: "JAX with ROCm backend"
  
  MI300X:
    name: AMD Instinct MI300X
    references:
      - name: AMD Instinct MI300X Product Page
        url: https://www.amd.com/en/products/accelerators/instinct/mi300/mi300x.html
      - name: AMD Instinct MI300X Datasheet
        url: https://www.amd.com/content/dam/amd/en/documents/instinct-tech-docs/data-sheets/amd-instinct-mi300x-data-sheet.pdf

    # MI300X uses a 3D chiplet design:
    # 3× GCD (GPU Compute Die, TSMC 5nm) + 4× MCD (Memory Cache Die, TSMC 6nm)
    # All 3 GCDs appear as a single unified GPU device with shared 192 GB HBM3.

    core_specifications:
      release_date: Q4 2023
      architecture: "CDNA 3"
      target_id: gfx942
      gpu_count: 1
      host_cpu: "User-supplied (AMD EPYC Genoa recommended for full Infinity Fabric coherency)"
      chiplet_topology: "3× GCD (5nm TSMC) + 4× MCD (6nm TSMC)"
      compute_units: 304               # total across all 3 GCDs
      stream_processors_per_cu: 64     # 64 Stream Processors per CU (4 SIMD-16 units × 16 lanes)
      stream_processors_per_gpu: 19456 # 64 × 304 CUs
      wavefront_size: 64               # AMD execution unit: 64 work-items issued together
      max_clock_speed: "2100 MHz (boost)"
      form_factor: "OAM (OCP Accelerator Module)"
      process_node: "5nm TSMC (GCD) / 6nm TSMC (MCD)"

    cu_execution_model:
      # CU = Compute Unit (AMD's fundamental execution building block)
      lds_per_cu: "64 KB LDS (Local Data Share)"
      max_wavefronts_per_cu: 32         # 32 × 64 work-items = 2048 work-items resident per CU
      max_workitems_per_cu: 2048        # maximum resident work-items per CU
      simd_units_per_cu: 4              # 4 × SIMD-16 units per CU
      vgpr_per_cu: "256 KB VGPR (64K × 32-bit Vector General Purpose Registers)"
      sgpr_per_cu: "12.5 KB SGPR (Scalar General Purpose Registers)"

      # Per-cycle throughput per CU (assuming a fully convergent wavefront)
      # Each SIMD-16 unit issues 16 lanes per cycle; CU has 4 SIMD-16 = 64 lanes total.
      per_cycle_throughput_per_cu:
        fp64_vector_per_cycle: "64 FP64 ops/cycle (4 SIMD-16 units × 16 lanes)"
        fp32_vector_per_cycle: "64 FP32 ops/cycle (4 SIMD-16 units × 16 lanes)"
        fp64_matrix_mfma_per_cycle: "512 FP64 FLOP/cycle (MFMA – Matrix Fused Multiply-Add)"
        fp16_bf16_matrix_mfma_per_cycle: "1024 FLOP/cycle (MFMA)"
        fp8_matrix_mfma_per_cycle: "2048 FLOP/cycle (MFMA)"
        int8_matrix_mfma_per_cycle: "2048 OPS/cycle (MFMA)"
      matrix_core_instruction: "MFMA (Matrix Fused Multiply-Add) — v_mfma_* ISA instructions"

    memory_specifications:
      architecture: "Dedicated HBM3; coherent with AMD EPYC CPUs via Infinity Fabric"
      total_capacity: "192 GB HBM3"
      memory_type: HBM3
      ecc_support: true
      addressing_mode: "Flat (unified virtual address space); coherent via XGMI/Infinity Fabric"
      pageable_memory_access: true
      concurrent_managed_access: true
      host_transfer: "PCIe 5.0 x16 (~128 GB/s) with standard x86 host; zero-copy via Infinity Fabric with EPYC"

      gpu_memory:
        capacity: "192 GB HBM3"
        memory_type: HBM3
        infinity_cache: "256 MB (last-level on-die cache across all 3 GCDs via Infinity Cache crossbar)"
        bandwidth: "5.3 TB/s"
        bus_width: "8192-bit (8 HBM3 stacks × 1024-bit)"

      memory_hierarchy:
        # Hierarchy from fastest/smallest to slowest/largest — per GPU, 304 CUs total

        vgpr_registers:
          capacity_per_cu: "256 KB VGPR (64K × 32-bit vector registers)"
          total_per_gpu: "~76 MB (256 KB × 304 CUs)"
          throughput: "On-chip; not bandwidth-bound — hundreds of TB/s aggregate"
          latency: "~1 cycle (within a wavefront, no RAW hazards)"

        lds_local_data_share:
          # LDS is the per-CU fast scratchpad; programmer-managed via HIP __shared__
          capacity_per_cu: "64 KB LDS"
          total_per_gpu: "~19 MB (64 KB × 304 CUs)"
          throughput: "~28 TB/s aggregate (304 CUs × 128 B/cycle × 2100 MHz)"
          latency: "~30–40 cycles (bank-conflict-free)"
          bank_count: 32
          bank_width: "4 bytes"

        l1_cache:
          capacity_per_cu: "32 KB L1 data cache"
          total_per_gpu: "~9.5 MB (32 KB × 304 CUs)"
          latency: "~20–30 cycles"

        infinity_cache:
          # Infinity Cache = last-level GPU cache; spans all 3 GCDs via the Infinity Cache crossbar
          capacity: "256 MB"
          throughput: "~27 TB/s (estimated)"
          latency: "~200–250 cycles"
          notes: "Reduces HBM3 traffic significantly for AI/HPC workloads with temporal locality"

        hbm_global_memory:
          capacity: "192 GB HBM3"
          memory_type: HBM3
          throughput: "5.3 TB/s"
          latency: "~400–500 cycles"
          bus_width: "8192-bit (8 stacks; HBM3 stacks on MCD chiplets)"

    compute_performance:
      fp64_vector: "81.7 TFLOPS"
      fp64_mfma_matrix: "163.4 TFLOPS"
      fp32_vector: "81.7 TFLOPS"
      fp32_mfma_matrix: "163.4 TFLOPS"
      tf32_mfma_matrix: "163.4 TFLOPS"
      fp16_bf16_mfma_dense: "1307.4 TFLOPS"
      fp16_bf16_mfma_sparse: "2614.9 TFLOPS"
      fp8_mfma_dense: "2614.9 TFLOPS"
      fp8_mfma_sparse: "5229.8 TFLOPS"
      int8_mfma_dense: "2614.9 TOPS"
      int8_mfma_sparse: "5229.8 TOPS"
      fp4_support: false
      fp6_support: false
      fp8_support: true
      matrix_core_generation: "3rd Gen CDNA Matrix Cores (MFMA)"

    power_and_thermal:
      socket_tdp: "750 W (OAM socket power)"
      idle_power: "~50 W (estimated)"
      form_factor: OAM
      cooling: "Direct liquid cooling via OAM socket (ASIC cooling integral to rack design)"
      compute_efficiency_fp16: "~1743 GFLOPS/W (1307 TFLOPS FP16 dense / 750 W)"

    advanced_features:
      compute_partitioning: "Yes — Accelerator Partitioning Mode (splits 3 GCDs into 1, 3, or 6 partitions)"
      xgmi_infinity_fabric: "4th Gen XGMI / Infinity Fabric — intra-node GPU-to-GPU bandwidth ~896 GB/s (8-GPU node)"
      ray_tracing: false
      fp8_native: true
      unified_virtual_address_space: true
      peer_memory_access: "Direct XGMI peer access within an OAM node (no PCIe round-trip)"

    networking_and_connectivity:
      pcie_interface: PCIe 5.0 x16
      intra_node_interconnect: "XGMI / Infinity Fabric 4th Gen (direct GPU-to-GPU links, up to 8 GPUs per OAM node)"
      rdma: "ROCEv2 via external NIC (e.g., AMD Pensando, Broadcom BCM57508)"
      gpu_memory_rdma: "HIPDirect RDMA (direct NIC DMA to/from HBM3 GPU memory)"

    software_and_ecosystem:
      rocm_version: "ROCm 6.0+"
      programming_model: "HIP (Heterogeneous Interface for Portability) — C++ GPU kernel language"
      kernel_language: "HIP C++ (mirrors CUDA C++ syntax; compile with hipcc)"
      math_libraries: "rocBLAS, rocFFT, rocSPARSE, rocRAND"
      dnn_library: "MIOpen (deep neural network primitives)"
      inference_runtime: "MIGraphX (model execution and optimization)"
      collective_comms: "RCCL (multi-GPU collectives; topology-aware for Infinity Fabric)"
      pytorch: "PyTorch 2.0+ (native ROCm backend)"
      tensorflow: "TensorFlow 2.12+ (ROCm backend)"
      jax: "JAX with ROCm backend"
      triton: "OpenAI Triton (ROCm/gfx942 support)"
      profiler: "ROCProfiler, ROCTracer, Omniperf"

